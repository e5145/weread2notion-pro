name: Sync WeRead Read Time

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 00:40 Asia/Shanghai.
    - cron: "40 16 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE: ${{ secrets.NOTION_PAGE }}
      REPOSITORY: ${{ github.repository }}
      REF: ${{ github.ref }}
      YEAR: ${{ vars.YEAR }}
      NAME: ${{ secrets.NAME }}
      BACKGROUND_COLOR: ${{ vars.background_color }}
      TRACK_COLOR: ${{ vars.track_color }}
      SPECIAL_COLOR1: ${{ vars.special_color }}
      SPECIAL_COLOR2: ${{ vars.special_color2 }}
      DOM_COLOR: ${{ vars.dom_color }}
      TEXT_COLOR: ${{ vars.text_color }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$WEREAD_API_KEY" || (echo "::error::Missing WEREAD_API_KEY secret" && exit 1)
          test -n "$NOTION_TOKEN" || (echo "::error::Missing NOTION_TOKEN secret" && exit 1)
          test -n "$NOTION_PAGE" || (echo "::error::Missing NOTION_PAGE secret" && exit 1)

      - name: Generate heatmap
        shell: bash
        run: |
          rm -rf ./OUT_FOLDER
          YEAR="${YEAR:-$(date +%Y)}"
          github_heatmap weread \
            --year "$YEAR" \
            --me "${NAME:-WeRead}" \
            --without-type-name \
            --background-color="${BACKGROUND_COLOR:-#FFFFFF}" \
            --track-color="${TRACK_COLOR:-#ACE7AE}" \
            --special-color1="${SPECIAL_COLOR1:-#69C16E}" \
            --special-color2="${SPECIAL_COLOR2:-#549F57}" \
            --dom-color="${DOM_COLOR:-#EBEDF0}" \
            --text-color="${TEXT_COLOR:-#000000}"

      - name: Publish heatmap image
        shell: bash
        run: |
          cd OUT_FOLDER
          RANDOM_FILENAME="$(uuidgen).svg"
          mv weread.svg "$RANDOM_FILENAME"
          find . -type f ! -name "$RANDOM_FILENAME" -delete
          cd ..
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add OUT_FOLDER
          if git diff --cached --quiet; then
            echo "No heatmap changes to commit."
          else
            git commit -m "update weread heatmap"
            git push
          fi

      - name: Sync read time
        run: read_time
